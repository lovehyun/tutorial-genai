# MCP 마켓플레이스 데모 스택.
#   nginx(prefix /mcp-market) → marketplace(8000) ← travel/weather/shopping(셀프 등록)
#
# 실행:  MARKET_TOKEN=... OPENAI_API_KEY=... docker compose up --build
#   · UI            : http://localhost:8080/mcp-market/
#   · 직접(프록시 없이): http://localhost:8000/
#
# 키(OPENAI_API_KEY/ANTHROPIC_API_KEY)는 호스트 env 또는 .env 에서 주입(채팅에만 필요, 선택).

x-token: &token ${MARKET_TOKEN:-demo-secret-token}

services:
  marketplace:
    build: .
    environment:
      MARKET_TOKEN: *token
      SHOW_TOKEN_IN_UI: "1"          # 데모: UI가 토큰 자동 첨부. 운영에선 0 권장
      ALLOW_PRIVATE_ENDPOINTS: "1"   # 데모서버가 내부망 주소라 허용. 운영에선 0 권장
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
    ports:
      - "8000:8000"                  # 직접 접근(선택). nginx 뒤로만 둘 거면 제거 가능
    restart: unless-stopped

  travel:
    build: .
    working_dir: /app/demo_server
    command: ["python", "travel_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
      SELF_HOST: travel              # 게이트웨이가 나를 찾는 주소(서비스명)
      REGISTRY_URL: http://marketplace:8000
      MARKET_TOKEN: *token
    depends_on: [marketplace]
    restart: unless-stopped

  weather:
    build: .
    working_dir: /app/demo_server
    command: ["python", "weather_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
      SELF_HOST: weather
      REGISTRY_URL: http://marketplace:8000
      MARKET_TOKEN: *token
    depends_on: [marketplace]
    restart: unless-stopped

  shopping:
    build: .
    working_dir: /app/demo_server
    command: ["python", "shopping_server.py"]
    environment:
      MCP_HOST: "0.0.0.0"
      SELF_HOST: shopping
      REGISTRY_URL: http://marketplace:8000
      MARKET_TOKEN: *token
    depends_on: [marketplace]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on: [marketplace]
    restart: unless-stopped
