# nginx reverse proxy 예시 — prefix /mcp-market 아래로 마켓플레이스를 노출.
#
# prefix 를 바꾸려면 location 의 /mcp-market/ 와 X-Forwarded-Prefix 두 곳만 같이 바꾸면 된다.
# (앱은 X-Forwarded-Prefix 를 읽어 UI·가이드·게이트웨이 주소를 자동으로 맞춘다.)

server {
    listen 80;
    server_name _;

    # 예: https://gensapps.com/mcp-market/ → 컨테이너의 marketplace:8000
    location /mcp-market/ {
        proxy_pass http://marketplace:8000/;     # 끝의 / 가 prefix 를 떼고 전달

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /mcp-market;   # ★ 앱이 이 값으로 주소를 구성

        # MCP streamable-http(SSE) 중계용 — 버퍼링 끄고 길게 유지
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # prefix 없이 루트로 쓰려면 위 블록 대신 아래처럼:
    # location / {
    #     proxy_pass http://marketplace:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off;
    # }
}
