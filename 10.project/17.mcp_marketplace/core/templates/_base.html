<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MCP 마켓플레이스{% endblock %}</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f5f6f8; color: #1f2937; }
  header { background: #1f2937; color: #fff; padding: 14px 24px; }
  header .top { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 18px; }
  header .sub { color: #9ca3af; font-size: 12px; }
  nav { margin-top: 10px; display: flex; gap: 4px; flex-wrap: wrap; }
  nav a { color: #cbd5e1; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 7px; }
  nav a:hover { background: #374151; color: #fff; }
  nav a.on { background: #2563eb; color: #fff; }
  .wrap { max-width: 1000px; margin: 20px auto; padding: 0 16px 60px; }
  .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
         background: #fff; padding: 14px 16px; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .bar label { font-size: 13px; color: #555; }
  select, input { padding: 7px 9px; border: 1px solid #cbd5e1; border-radius: 7px; font-size: 14px; }
  button { padding: 7px 13px; border: 0; border-radius: 7px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: #e5e7eb; color: #333; }
  button.danger { background: #ef4444; }
  button.mini { padding: 3px 8px; font-size: 12px; }
  .muted { color: #9ca3af; font-size: 12px; }
  section h2 { font-size: 15px; color: #374151; margin: 22px 0 6px; }
  .status { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .ONLINE    { background: #dcfce7; color: #166534; }
  .UNHEALTHY { background: #fef9c3; color: #854d0e; }
  .OFFLINE   { background: #fee2e2; color: #991b1b; }
  .ARCHIVED  { background: #f3f4f6; color: #6b7280; }
  /* 🔑 토큰 모달 */
  .tk-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; }
  .tk-modal { background: #fff; max-width: 460px; margin: 14vh auto; border-radius: 12px; padding: 20px 22px; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  .tk-modal h3 { margin: 0 0 10px; font-size: 16px; }
  .tk-row { display: flex; gap: 8px; }
  .tk-row input { flex: 1; font-family: ui-monospace, Menlo, monospace; }
  .tk-row input[readonly] { background: #f8fafc; color: #334155; }
  .tk-note { font-size: 12px; color: #6b7280; margin-top: 10px; line-height: 1.5; }
  .tk-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  {% block style %}{% endblock %}
</style>
</head>
<body>
<header>
  <div class="top">
    <h1>🛒 MCP 마켓플레이스 &amp; 게이트웨이</h1>
    <span class="sub">등록 서버(Registry) + 프록시 게이트웨이(Gateway)</span>
  </div>
  <nav>
    <a href="{{ base }}/"           class="{{ 'on' if active=='dashboard' }}">📊 대시보드</a>
    <a href="{{ base }}/browse"     class="{{ 'on' if active=='browse' }}">🖥️ MCP 서버</a>
    <a href="{{ base }}/consumers"  class="{{ 'on' if active=='consumers' }}">👤 컨슈머</a>
    <a href="{{ base }}/playground" class="{{ 'on' if active=='playground' }}">🧪 도구 테스트</a>
    <a href="{{ base }}/chat"       class="{{ 'on' if active=='chat' }}">💬 채팅</a>
    <a href="{{ base }}/logs"       class="{{ 'on' if active=='logs' }}">📜 요청 로그</a>
    <a href="{{ base }}/guide"      class="{{ 'on' if active=='guide' }}">📘 SDK 가이드</a>
    <span style="flex:1"></span>
    <a href="#" onclick="askToken();return false" title="쓰기/구독/등록에 필요한 공유 토큰 설정">🔑 토큰</a>
  </nav>
</header>

<div class="wrap">
  {% block content %}{% endblock %}
</div>

<!-- 🔑 토큰 모달 -->
<div class="tk-overlay" id="tkOverlay" onclick="if(event.target===this)tkClose()">
  <div class="tk-modal">
    <h3>🔑 공유 토큰</h3>
    <div id="tkBody"></div>
    <div class="tk-actions"><button class="ghost" onclick="tkClose()">닫기</button></div>
  </div>
</div>

<script>
const BASE = "{{ base }}";   // nginx prefix(/mcp-market 등) 반영 — 모든 fetch는 이 BASE 기준
const j = (u, o) => fetch(BASE + u, o).then(r => r.json());

// ── 공유 Bearer 토큰 (읽기는 불필요, 쓰기/구독/등록/도구실행/채팅에 필요) ──
const _TK = "mkt_token";
function getToken() { return localStorage.getItem(_TK) || ""; }

// 페이지 로드 시: 서버가 토큰을 공개(SHOW_TOKEN_IN_UI)하면 '항상' 그 값으로 동기화한다.
// → 서버가 정한 값이 진실. 사용자가 임의로 바꿔 깨뜨릴 수 없게 한다.
(async () => {
  try { const h = await j("/api/token-hint"); if (h && h.token) localStorage.setItem(_TK, h.token); } catch (e) {}
})();

async function askToken() {
  let info = {};
  try { info = await j("/api/token-hint"); } catch (e) {}
  const body = document.getElementById("tkBody");
  if (info && info.token) {
    // 서버가 정한 토큰 — 읽기전용 + 복사 (변경 불가)
    localStorage.setItem(_TK, info.token);
    body.innerHTML =
      `<div class="tk-row"><input id="tkVal" readonly value="${info.token}" onclick="this.select()">
         <button onclick="tkCopy()">복사</button></div>
       <div class="tk-note">이 서버가 정한 <b>공유 토큰</b>입니다. <b>변경할 수 없으며</b>, UI는 자동으로 이 토큰을 사용합니다.
         SDK/curl 로 직접 호출할 때 <code>Authorization: Bearer &lt;위 토큰&gt;</code> 로 쓰세요.</div>`;
  } else if (info && info.auth) {
    // 보호 모드 — 서버가 토큰을 공개하지 않음 → 외부에서 받은 토큰을 직접 입력
    body.innerHTML =
      `<div class="tk-row"><input id="tkVal" placeholder="발급받은 토큰 붙여넣기" value="${getToken()}">
         <button onclick="tkSave()">저장</button></div>
       <div class="tk-note">쓰기/구독/도구실행에 필요합니다. 강사가 안내한 토큰을 입력하세요.</div>`;
  } else {
    body.innerHTML = `<div class="tk-note">이 서버는 토큰 인증이 꺼져 있습니다(누구나 쓰기 가능).</div>`;
  }
  document.getElementById("tkOverlay").style.display = "block";
}
function tkClose() { document.getElementById("tkOverlay").style.display = "none"; }
function tkCopy() { const v = document.getElementById("tkVal"); v.select(); navigator.clipboard?.writeText(v.value); }
function tkSave() { localStorage.setItem(_TK, document.getElementById("tkVal").value.trim()); tkClose(); }
function authHeaders(extra) {
  const h = Object.assign({"Content-Type": "application/json"}, extra || {});
  const t = getToken();
  if (t) h["Authorization"] = "Bearer " + t;
  return h;
}
// 쓰기 요청 래퍼 — 401 이면 토큰 입력을 유도
async function jw(url, method, body) {
  const r = await fetch(BASE + url, {
    method, headers: authHeaders(),
    body: body != null ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401) { alert("토큰이 필요하거나 올바르지 않습니다. 🔑 토큰을 설정하세요."); askToken(); }
  return r;
}
{% block script %}{% endblock %}
</script>
</body>
</html>
