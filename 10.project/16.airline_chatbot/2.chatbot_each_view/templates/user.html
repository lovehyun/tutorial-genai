<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>н•ӯкіө мҳҲм•Ҫ вҖ” {{ user_id }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>вңҲпёҸ н•ӯкіө мҳҲм•Ҫ вҖ” {{ user_id }} лӢҳ</h1>
    <p>
      <form method="post" action="{{ url_for('logout') }}" style="display:inline">
        <button type="submit" class="ghost">лЎңк·ём•„мӣғ</button>
      </form>
      <a href="/admin">кҙҖлҰ¬мһҗ нҷ”л©ҙ вҶ’</a>
    </p>
  </header>

  <main>
    <section class="left">
      <h2>1. н•ӯкіөнҺё кІҖмғү</h2>
      <form id="search">
        <input id="origin" placeholder="м¶ңл°ңм§Җ (ICN)" autocomplete="off">
        <input id="dest"   placeholder="лҸ„м°©м§Җ (NRT)" autocomplete="off">
        <button type="submit">кІҖмғү</button>
      </form>
      <ul id="flights"></ul>

      <h2>2. лӮҙ мҳҲм•Ҫ</h2>
      <ul id="my-bookings"></ul>
    </section>

    <section class="right chat-pane">
      <h2>рҹӨ– н•ӯкіө л№„м„ң</h2>
      <ul id="messages"></ul>
      <form id="chat-form">
        <input id="chat-input" placeholder="мҳҲ: 'ICNвҶ’NRT н•ӯкіөнҺё ліҙм—¬мӨҳ, к°ҖмһҘ м Җл ҙн•ң кұ° мҳҲм•Ҫ'" autocomplete="off" required>
        <button type="submit">ліҙлӮҙкё°</button>
      </form>
      <p class="examples">
        мҳҲмӢң:
        <button class="ex">ICNвҶ’NRT н•ӯкіөнҺё м•Ңл ӨмӨҳ</button>
        <button class="ex">к°ҖмһҘ мӢј ICNвҶ’NRT н•ӯкіөнҺё мҳҲм•Ҫн•ҙмӨҳ</button>
        <button class="ex">лӮҙ мҳҲм•Ҫ ліҙм—¬мӨҳ</button>
        <button class="ex">л°©кёҲ мҳҲм•Ҫн•ң кұ° м·ЁмҶҢн•ҙмӨҳ</button>
      </p>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    async function loadFlights() {
      const o = $('origin').value.trim();
      const d = $('dest').value.trim();
      const qs = new URLSearchParams();
      if (o) qs.append('origin', o);
      if (d) qs.append('dest', d);
      const r = await fetch('/api/flights?' + qs);
      const flights = await r.json();
      $('flights').innerHTML = flights.length === 0
        ? '<li class="empty">(кІ°кіј м—ҶмқҢ)</li>'
        : flights.map(f => `
            <li>
              <strong>${f.code}</strong> ${f.origin}вҶ’${f.dest} В· ${f.depart_at.slice(0,16)}
              В· мһ”м—¬ ${f.seats_left}м„қ В· ${f.price.toLocaleString()}мӣҗ
              <button data-id="${f.id}" class="book">мҳҲм•Ҫ</button>
            </li>
          `).join('');
    }

    async function loadMyBookings() {
      const r = await fetch('/api/my-bookings');
      const list = await r.json();
      if (list.error) { $('my-bookings').innerHTML = `<li>${list.error}</li>`; return; }
      $('my-bookings').innerHTML = list.length === 0
        ? '<li class="empty">(мҳҲм•Ҫ м—ҶмқҢ)</li>'
        : list.map(b => `
            <li class="${b.status === 'CANCELED' ? 'canceled' : ''}">
              #${b.id} В· <strong>${b.code}</strong> ${b.origin}вҶ’${b.dest}
              В· ${b.depart_at.slice(0,16)} В· ${b.status}
              ${b.status === 'BOOKED' ? `<button data-bid="${b.id}" class="cancel">м·ЁмҶҢ</button>` : ''}
            </li>
          `).join('');
    }

    $('search').addEventListener('submit', (e) => { e.preventDefault(); loadFlights(); });

    $('flights').addEventListener('click', async (e) => {
      if (!e.target.classList.contains('book')) return;
      const r = await fetch('/api/bookings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ flight_id: parseInt(e.target.dataset.id) }),
      });
      const d = await r.json();
      alert(d.ok ? `мҳҲм•Ҫ мҷ„лЈҢ (#${d.booking_id})` : d.error);
      loadFlights(); loadMyBookings();
    });

    $('my-bookings').addEventListener('click', async (e) => {
      if (!e.target.classList.contains('cancel')) return;
      if (!confirm('м·ЁмҶҢн• к№Ңмҡ”?')) return;
      const r = await fetch(`/api/bookings/${e.target.dataset.bid}/cancel`, { method: 'POST' });
      const d = await r.json();
      alert(d.ok ? 'м·ЁмҶҢ мҷ„лЈҢ' : d.error);
      loadFlights(); loadMyBookings();
    });

    // в”Җв”Җв”Җ мұ—лҙҮ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const messages = $('messages');
    function addMsg(role, text) {
      const li = document.createElement('li');
      li.className = 'msg ' + role;
      li.innerHTML = `<strong>${role === 'user' ? 'лӮҳ' : 'AI'}:</strong> ` + text.replace(/\n/g, '<br>');
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendChat(msg) {
      addMsg('user', msg);
      addMsg('ai', '...');
      const r = await fetch('/chat/user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      const d = await r.json();
      messages.lastChild.innerHTML = `<strong>AI:</strong> ` + (d.answer || d.error).replace(/\n/g, '<br>');
      if (d.changed) { loadFlights(); loadMyBookings(); }
    }

    $('chat-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const v = $('chat-input').value.trim();
      if (!v) return;
      $('chat-input').value = '';
      sendChat(v);
    });

    document.querySelectorAll('button.ex').forEach(btn => {
      btn.addEventListener('click', () => sendChat(btn.textContent));
    });

    loadFlights();
    loadMyBookings();
  </script>
</body>
</html>
