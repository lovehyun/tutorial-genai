{% extends 'base.html' %}

{% block title %}Register - Vibe 회원가입{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-header">
        <h2 class="auth-title" data-i18n="register_title">VIBE 회원가입</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem;" data-i18n="register_subtitle">지금 가입하고 실시간 음악 소식과 감성을 공유해 보세요.</p>
    </div>

    {% if error %}
        <div class="auth-error">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form action="{{ url_for('register_page') }}" method="POST">
        <div class="form-group">
            <label for="username" data-i18n="register_id">사용할 아이디</label>
            <input type="text" id="username" name="username" class="input-premium" placeholder="3자 이상 입력하세요" data-i18n-placeholder="register_id_placeholder" required minlength="3" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password" data-i18n="register_pw">비밀번호</label>
            <input type="password" id="password" name="password" class="input-premium" placeholder="4자 이상 입력하세요" data-i18n-placeholder="register_pw_placeholder" required minlength="4" autocomplete="new-password">
        </div>

        <div class="form-group">
            <label for="confirm_password" data-i18n="register_pw_confirm">비밀번호 확인</label>
            <input type="password" id="confirm_password" name="confirm_password" class="input-premium" placeholder="동일한 비밀번호를 다시 입력하세요" data-i18n-placeholder="register_pw_confirm_placeholder" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-auth-submit" data-i18n="register_submit">회원가입 완료</button>
    </form>

    <div class="auth-footer" data-i18n="register_footer">
        이미 계정이 있으신가요? <a href="{{ url_for('login_page') }}">로그인 하기</a>
    </div>
</div>
{% endblock %}
