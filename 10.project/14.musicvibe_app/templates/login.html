{% extends 'base.html' %}

{% block title %}Login - Vibe{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-header">
        <h2 class="auth-title" data-i18n="login_title">VIBE 로그인</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem;" data-i18n="login_subtitle">음악으로 하나 되는 공간, 바이브에 로그인하세요.</p>
    </div>

    {% if error %}
        <div class="auth-error">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form action="{{ url_for('login_page', next=request.args.get('next', '')) }}" method="POST">
        <div class="form-group">
            <label for="username" data-i18n="login_id">아이디</label>
            <input type="text" id="username" name="username" class="input-premium" placeholder="아이디를 입력하세요" data-i18n-placeholder="login_id_placeholder" required autofocus autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password" data-i18n="login_pw">비밀번호</label>
            <input type="password" id="password" name="password" class="input-premium" placeholder="비밀번호를 입력하세요" data-i18n-placeholder="login_pw_placeholder" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-auth-submit" data-i18n="login_submit">들어가기</button>
    </form>

    <div class="auth-footer" data-i18n="login_footer">
        아직 계정이 없으신가요? <a href="{{ url_for('register_page') }}">회원가입 하기</a>
    </div>
</div>
{% endblock %}
