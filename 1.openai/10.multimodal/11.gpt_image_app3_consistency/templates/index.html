<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>gpt-image-1 · 일관성 유지 변형</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    textarea { width: 100%; height: 56px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 18px; margin-top: 8px; background: #10a37f; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .row { display: flex; gap: 16px; margin-top: 16px; }
    .row > div { flex: 1; }
    img { max-width: 100%; border-radius: 8px; }
    .status { color: #888; }
  </style>
</head>
<body>
  <h1>gpt-image-1 · 3단계: 주인공을 유지한 채 변형</h1>
  <p>기준 이미지(주인공/캐릭터)를 올리고 새 장면을 프롬프트로 입력하면,<br>
     gpt-image-1이 <b>같은 피사체를 유지</b>하면서 새 이미지를 만듭니다.</p>

  <input type="file" id="ref" accept="image/*" onchange="previewRef()"><br>
  <textarea id="prompt" placeholder="예: 이 캐릭터가 눈 내리는 도시를 걷고 있는 모습"></textarea><br>
  <button id="btn" onclick="transform()">변형 생성</button>

  <div class="row">
    <div><b>기준 이미지</b><br><img id="refPreview"></div>
    <div><b>결과</b><br><div id="result"></div></div>
  </div>

  <script>
    function previewRef() {
      const f = document.getElementById('ref').files[0];
      if (f) document.getElementById('refPreview').src = URL.createObjectURL(f);
    }

    async function transform() {
      const f = document.getElementById('ref').files[0];
      const prompt = document.getElementById('prompt').value.trim();
      if (!f || !prompt) { alert('기준 이미지와 프롬프트를 모두 입력하세요.'); return; }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('result').innerHTML = '<p class="status">생성 중...</p>';

      // 파일 업로드이므로 FormData로 전송 (JSON이 아님)
      const fd = new FormData();
      fd.append('reference', f);
      fd.append('prompt', prompt);
      try {
        const res = await fetch('/transform', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) document.getElementById('result').innerHTML = '오류: ' + data.error;
        else document.getElementById('result').innerHTML =
          '<img src="data:image/png;base64,' + data.image + '">';
      } catch (e) {
        document.getElementById('result').innerHTML = '요청 실패: ' + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
