<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>gpt-image-1 · 이미지 생성</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    textarea { width: 100%; height: 70px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; margin-top: 8px; background: #10a37f; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #ccc; }
    #result { margin-top: 16px; }
    #result img { max-width: 100%; border-radius: 8px; }
    .status { color: #888; }
  </style>
</head>
<body>
  <h1>gpt-image-1 · 1단계: 이미지 생성</h1>
  <p>프롬프트를 입력하면 gpt-image-1이 이미지를 생성합니다.</p>
  <textarea id="prompt" placeholder="예: 우주복을 입은 귀여운 고양이, 디지털 아트"></textarea><br>
  <button id="btn" onclick="generate()">생성</button>
  <div id="result"></div>

  <script>
    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      result.innerHTML = '<p class="status">생성 중... (수십 초 걸릴 수 있습니다)</p>';
      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        if (data.error) result.innerHTML = '<p>오류: ' + data.error + '</p>';
        else result.innerHTML = '<img src="data:image/png;base64,' + data.image + '">';
      } catch (e) {
        result.innerHTML = '<p>요청 실패: ' + e.message + '</p>';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
