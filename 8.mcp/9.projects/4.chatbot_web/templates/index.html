<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCP 챗봇</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 12px; }
    h1 { font-size: 20px; }
    .hint { color: #666; font-size: 13px; margin-bottom: 12px; }
    #log { border: 1px solid #ddd; border-radius: 8px; height: 420px; overflow-y: auto; padding: 12px; }
    .msg { margin: 8px 0; }
    .user { text-align: right; }
    .bubble { display: inline-block; padding: 8px 12px; border-radius: 12px; max-width: 80%; white-space: pre-wrap; }
    .user .bubble { background: #2563eb; color: #fff; }
    .bot .bubble { background: #f1f5f9; }
    .tools { color: #16a34a; font-size: 12px; margin-top: 2px; }
    form { display: flex; gap: 8px; margin-top: 12px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; }
  </style>
</head>
<body>
  <h1>🤖 MCP 챗봇 <span class="hint">(LangChain 에이전트 + MCP 도구)</span></h1>
  <div class="hint">사용 가능한 MCP 도구: <b>{{ tools }}</b><br>
    예: "12 * 7 은?", "지금 몇 시야?", "주사위 굴려줘", "서울 날씨 알려줘"</div>
  <div id="log"></div>
  <form id="f">
    <input id="m" placeholder="메시지를 입력하세요…" autocomplete="off" autofocus>
    <button>전송</button>
  </form>

  <script>
    const log = document.getElementById('log');
    function add(who, text, tools) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.innerHTML = `<div class="bubble"></div>`;
      div.querySelector('.bubble').textContent = text;
      if (tools && tools.length) {
        const t = document.createElement('div');
        t.className = 'tools'; t.textContent = '🛠 사용한 도구: ' + tools.join(', ');
        div.appendChild(t);
      }
      log.appendChild(div); log.scrollTop = log.scrollHeight;
    }
    document.getElementById('f').onsubmit = async (e) => {
      e.preventDefault();
      const input = document.getElementById('m');
      const text = input.value.trim(); if (!text) return;
      add('user', text); input.value = '';
      add('bot', '…');
      const last = log.lastChild;
      const r = await fetch('/chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: text })
      });
      const data = await r.json();
      log.removeChild(last);
      add('bot', data.reply, data.tools_used);
    };
  </script>
</body>
</html>
