<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쇼핑·여행 컨시어지 (MCP)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 660px; margin: 24px auto; padding: 0 12px; }
    h1 { font-size: 20px; }
    .hint { color: #666; font-size: 13px; margin-bottom: 12px; }
    #log { border: 1px solid #ddd; border-radius: 8px; height: 440px; overflow-y: auto; padding: 12px; }
    .msg { margin: 8px 0; }
    .user { text-align: right; }
    .bubble { display: inline-block; padding: 8px 12px; border-radius: 12px; max-width: 82%; white-space: pre-wrap; }
    .user .bubble { background: #2563eb; color: #fff; }
    .bot .bubble { background: #f1f5f9; }
    .tools { color: #16a34a; font-size: 12px; margin-top: 2px; }
    form { display: flex; gap: 8px; margin-top: 12px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 16px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; }
  </style>
</head>
<body>
  <h1>🧳🛒 쇼핑·여행 컨시어지 <span class="hint">(한 에이전트 + 두 MCP 서버)</span></h1>
  <div class="hint">
    내 챗봇 하나가 <b>쇼핑몰</b>·<b>여행사</b> 두 외부 MCP 서버와 통신합니다. 도구: <b>{{ tools }}</b><br>
    예: "노트북 할인가 알려줘" · "캐리어 2개 주문해줘" · "제주도 여행 상품 보여줘"<br>
    복합: <b>"도쿄 여행 예약하고 캐리어도 하나 사줘"</b> · "내 주문이랑 예약 다 보여줘"
  </div>
  <div id="log"></div>
  <form id="f">
    <input id="m" placeholder="메시지를 입력하세요…" autocomplete="off" autofocus>
    <button>전송</button>
  </form>

  <script>
    const log = document.getElementById('log');
    function add(who, text, tools) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.innerHTML = `<div class="bubble"></div>`;
      div.querySelector('.bubble').textContent = text;
      if (tools && tools.length) {
        const t = document.createElement('div');
        t.className = 'tools'; t.textContent = '🛠 호출한 MCP 도구: ' + tools.join(', ');
        div.appendChild(t);
      }
      log.appendChild(div); log.scrollTop = log.scrollHeight;
    }
    document.getElementById('f').onsubmit = async (e) => {
      e.preventDefault();
      const input = document.getElementById('m');
      const text = input.value.trim(); if (!text) return;
      add('user', text); input.value = '';
      add('bot', '…'); const last = log.lastChild;
      const r = await fetch('/chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: text })
      });
      const data = await r.json();
      log.removeChild(last);
      add('bot', data.reply, data.tools_used);
    };
  </script>
</body>
</html>
