<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>RAG REST API #4 — 1단계</title>
    <style>
        /* 디자인 최소화 — 기본 글꼴 + 약간의 여백만 */
        body {
            font-family: sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 16px;
        }
        section {
            margin-bottom: 28px;
        }
        h2 {
            font-size: 1.1em;
        }
        input[type='text'] {
            width: 65%;
            padding: 6px;
        }
        button {
            padding: 6px 12px;
            cursor: pointer;
        }
        #answer {
            white-space: pre-wrap;
            margin-top: 12px;
        }
        .src {
            color: #666;
            font-size: 0.9em;
        }
        .status {
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>RAG 챗봇 (REST API · 1단계)</h1>
    <p class="status">정적 HTML 이 fetch 로 REST API 를 호출합니다 (업로드 / 질문).</p>

    <section>
        <h2>1. PDF 업로드</h2>
        <input type="file" id="file-input" accept=".pdf" />
        <button id="upload-btn">업로드</button>
        <p id="upload-status" class="status"></p>
    </section>

    <section>
        <h2>2. 질문</h2>
        <input type="text" id="question-input" placeholder="질문을 입력하세요" />
        <button id="ask-btn">질문</button>
        <div id="answer"></div>
        <ul id="sources"></ul>
    </section>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');

        const uploadStatus = document.getElementById('upload-status');
        const questionInput = document.getElementById('question-input');
        
        const askBtn = document.getElementById('ask-btn');
        const answerBox = document.getElementById('answer');
        const sourceList = document.getElementById('sources');

        // 업로드 → POST /files
        uploadBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) {
                alert('파일을 선택하세요');
                return;
            }
            const form = new FormData();
            form.append('file', file);
            uploadStatus.textContent = '업로드 중...';
            const res = await fetch('/files', { method: 'POST', body: form });
            const data = await res.json();
            uploadStatus.textContent = data.message || data.error;
        };

        // 질문 → POST /ask
        askBtn.onclick = async () => {
            const question = questionInput.value.trim();
            if (!question) return;
            answerBox.textContent = '답변 생성 중...';
            sourceList.innerHTML = '';
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question }),
            });
            const data = await res.json();
            answerBox.textContent = data.answer || data.error || '';
            (data.sources || []).forEach((s) => {
                const li = document.createElement('li');
                li.className = 'src';
                li.textContent = `${s.file} (p.${s.page}, 유사도 ${s.score}%)`;
                sourceList.appendChild(li);
            });
        };
    </script>
</body>
</html>
