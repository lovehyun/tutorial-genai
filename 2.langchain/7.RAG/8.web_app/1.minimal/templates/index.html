<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>RAG #1 — 최소 MVP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <header>
        <h1>RAG 챗봇 #1</h1>
        <p>최소 MVP — PDF 업로드 후 질문</p>
    </header>

    <main>
        <section>
            <h2>1. PDF 업로드</h2>
            <form id="upload-form">
                <input type="file" id="file-input" accept=".pdf" required />
                <button type="submit">업로드</button>
            </form>
            <p id="upload-status"></p>
        </section>

        <section>
            <h2>2. 질문하기</h2>
            <form id="ask-form">
                <input type="text" id="question-input" placeholder="질문을 입력하세요" required />
                <button type="submit">질문</button>
            </form>
            <div id="answer"></div>
        </section>
    </main>

    <script>
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            if (!file) return;

            const status = document.getElementById('upload-status');
            status.textContent = '업로드 중...';

            const fd = new FormData();
            fd.append('file', file);
            
            const r = await fetch('/upload', { method: 'POST', body: fd });
            const d = await r.json();
            status.textContent = d.message || d.error;
        });

        document.getElementById('ask-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = document.getElementById('question-input').value.trim();
            const ansEl = document.getElementById('answer');
            ansEl.textContent = '답변 생성 중...';

            const r = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q }),
            });

            const d = await r.json();
            ansEl.textContent = d.answer || d.error;
        });
    </script>
</body>
</html>
